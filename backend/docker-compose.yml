services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: plumetrace-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
    command: >
      sh -c "printf 'listener 1883 0.0.0.0\nallow_anonymous true\npersistence true\npersistence_location /mosquitto/data/\nlog_dest stdout\n' > /mosquitto/config/mosquitto.conf
      && mosquitto -c /mosquitto/config/mosquitto.conf"
    volumes:
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: plumetrace-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - MQTT_BROKER_HOST=mosquitto
      - MQTT_BROKER_PORT=1883
      - DATABASE_URL=sqlite+aiosqlite:////data/plumetrace.db
    volumes:
      - backend_db:/data
    depends_on:
      - mosquitto
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  mock-sensors:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: plumetrace-mock-sensors
    restart: unless-stopped
    environment:
      - MQTT_BROKER_HOST=mosquitto
      - MQTT_BROKER_PORT=1883
      - SENSOR_COUNT=8
    depends_on:
      - mosquitto
    command: python mock_sensors.py

volumes:
  mosquitto_data:
  mosquitto_log:
  backend_db:
