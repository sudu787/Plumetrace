services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: plumetrace-mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
    command: >
      sh -c "printf 'listener 1883 0.0.0.0\nallow_anonymous true\npersistence true\npersistence_location /mosquitto/data/\nlog_dest stdout\n' > /mosquitto/config/mosquitto.conf
      && mosquitto -c /mosquitto/config/mosquitto.conf"
    volumes:
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    healthcheck:
      test: ["CMD-SHELL", "mosquitto_pub -h localhost -t plumetrace/health -m ok >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

volumes:
  mosquitto_data:
  mosquitto_log:
